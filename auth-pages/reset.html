<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Reset password — Eventlyy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="container auth-container">
    <a href="../index.html" class="brand-link">← Back</a>
    <div class="auth-split">
      <section class="auth-panel">
        <span class="panel-badge">Reset password</span>
        <h2>Choose a new secure password</h2>
        <p>Update your credentials and get back to the event flow quickly and safely.</p>
        <ul>
          <li>Strong password guidance for peace of mind</li>
          <li>Instant confirmation when your reset is complete</li>
          <li>Designed for touch-friendly devices</li>
        </ul>
      </section>
      <div class="auth-card">
        <h1>Set a new password</h1>
        <div class="auth-message" aria-live="polite"></div>
        <form id="reset-form">
          <label>New password
            <input type="password" id="reset-password" required placeholder="New password">
          </label>
          <label>Confirm password
            <input type="password" id="reset-password-confirm" required placeholder="Confirm password">
          </label>
          <button type="submit" class="checkout-btn">Reset password</button>
        </form>
      </div>
    </div>
  </main>
  <script src="auth.js" defer></script>
  <script src="../app.js" defer></script>
</body>
</html>
